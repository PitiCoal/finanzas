<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finanzas 2026</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a12;
  --surface: #2a2a48;
  --surface2: #3a3a64;
  --border: #52527a;
  --text: #ffffff;
  --text2: #ccccee;
  --green: #4ade80;
  --green2: #22c55e;
  --green-dim: rgba(74,222,128,.2);
  --red: #ff7a7a;
  --red2: #ef4444;
  --red-dim: rgba(248,113,113,.2);
  --amber: #fbbf24;
  --amber-dim: rgba(251,191,36,.2);
  --blue: #60a5fa;
  --purple: #a78bfa;
  --cyan: #22d3ee;
  --pink: #f472b6;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 2px 12px rgba(0,0,0,.5);
  --shadow-lg: 0 4px 30px rgba(0,0,0,.7);
  --transition: .2s ease;
}
html { font-size: 17px; }
body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; -webkit-font-smoothing: antialiased; }
header { background: linear-gradient(135deg, var(--surface) 0%, #353558 100%); border-bottom: 1px solid var(--border); padding: 12px 20px; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
header h1 { font-size: 1.3rem; background: linear-gradient(135deg, var(--green) 0%, var(--cyan) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-weight: 800; letter-spacing: 0.5px; }
header .month-selector { display: flex; align-items: center; gap: 8px; }
header .month-selector select { background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; font-size: 0.9rem; cursor: pointer; }
/* Desktop tabs */
.tabs-desktop { display: flex; gap: 2px; background: var(--surface); padding: 6px 8px 0 8px; overflow-x: auto; border-bottom: 1px solid var(--border); position: sticky; top: 60px; z-index: 99; }
.tabs-desktop button { background: none; border: none; color: var(--text2); padding: 12px 18px; cursor: pointer; font-size: 0.9rem; border-radius: 8px 8px 0 0; white-space: nowrap; transition: all var(--transition); min-width: max-content; display: flex; align-items: center; gap: 6px; }
.tabs-desktop button:hover { color: var(--text); background: var(--surface2); }
.tabs-desktop button.active { color: var(--green); background: var(--bg); font-weight: 600; box-shadow: inset 0 -2px 0 var(--green); }
.tab-icon { display: inline-block; width: 16px; height: 16px; vertical-align: middle; }
/* Mobile bottom nav */
.tabs-mobile { display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 999; background: linear-gradient(180deg, var(--surface) 0%, #1e1e32 100%); border-top: 1px solid var(--border); padding: 4px 0 env(safe-area-inset-bottom, 4px) 0; justify-content: space-around; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
.tabs-mobile button { background: none; border: none; color: var(--text2); padding: 4px 6px; cursor: pointer; font-size: .6rem; border-radius: 6px; transition: all var(--transition); display: flex; flex-direction: column; align-items: center; gap: 2px; min-width: 0; flex: 1; }
.tabs-mobile button .tab-icon { width: 20px; height: 20px; }
.tabs-mobile button span { font-size: .55rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
.tabs-mobile button:hover { color: var(--text); }
.tabs-mobile button.active { color: var(--green); }
main { max-width: 1100px; margin: 0 auto; padding: 20px 16px 80px; }
h2 { font-size: 1.35rem; margin-bottom: 16px; color: var(--text); font-weight: 700; }
h3 { font-size: 1.1rem; margin-bottom: 10px; color: var(--text2); font-weight: 600; }
.card { background: linear-gradient(135deg, var(--surface) 0%, #353558 100%); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; box-shadow: var(--shadow); transition: box-shadow var(--transition); }
.card:hover { box-shadow: var(--shadow-lg); }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 0.85rem; color: var(--text2); margin-bottom: 5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 12px; background: var(--surface2); border: 1.5px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 0.95rem; font-family: inherit; transition: border-color var(--transition); }
.form-group input:focus, .form-group select:focus { outline: none; border-color: var(--green); box-shadow: 0 0 0 3px var(--green-dim); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.btn { padding: 11px 22px; border: none; border-radius: var(--radius-sm); cursor: pointer; font-size: 0.9rem; font-weight: 600; transition: all var(--transition); display: inline-flex; align-items: center; gap: 6px; justify-content: center; }
.btn-primary { background: linear-gradient(135deg, var(--green2) 0%, #16a34a 100%); color: #000; }
.btn-primary:hover { background: linear-gradient(135deg, var(--green) 0%, var(--green2) 100%); transform: translateY(-1px); }
.btn-sm { padding: 7px 16px; font-size: 0.82rem; }
.btn-outline { background: none; border: 1px solid var(--border); color: var(--text); }
.btn-outline:hover { background: var(--surface2); border-color: var(--text2); }
.btn-danger { background: linear-gradient(135deg, var(--red2) 0%, #dc2626 100%); color: #fff; }
.btn-danger:hover { background: linear-gradient(135deg, var(--red) 0%, var(--red2) 100%); transform: translateY(-1px); }
.btn-amber { background: linear-gradient(135deg, var(--amber) 0%, #f59e0b 100%); color: #000; }
.btn-amber:hover { transform: translateY(-1px); }
.metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 16px; }
.metric { background: linear-gradient(135deg, var(--surface2) 0%, #474774 100%); border-radius: var(--radius); padding: 18px 14px; text-align: center; border: 1px solid var(--border); transition: all var(--transition); }
.metric:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
.metric .label { font-size: 0.78rem; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
.metric .value { font-size: 1.5rem; font-weight: 800; margin-top: 6px; letter-spacing: -0.5px; }
.metric .value.green { color: var(--green); }
.metric .value.red { color: var(--red); }
.metric .account-info { display: flex; align-items: center; justify-content: center; gap: 6px; font-weight: 600; font-size: .85rem; }
.charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.chart-container { background: linear-gradient(135deg, var(--surface2) 0%, #474774 100%); border-radius: var(--radius); padding: 16px; text-align: center; border: 1px solid var(--border); }
.chart-container svg { max-width: 100%; height: auto; }
.bar-chart-container { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); }
th { color: var(--text2); font-weight: 700; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.5px; position: sticky; top: 0; background: var(--surface); }
tr:hover { background: var(--surface2); }
td.right { text-align: right; font-variant-numeric: tabular-nums; }
td.green { color: var(--green); font-weight: 600; }
td.red { color: var(--red); font-weight: 600; }
.alert { padding: 12px 16px; border-radius: var(--radius-sm); margin-bottom: 10px; font-size: 0.85rem; font-weight: 500; display: flex; align-items: center; gap: 8px; }
.alert-warning { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(251,191,36,.3); }
.alert-danger { background: var(--red-dim); color: var(--red); border: 1px solid rgba(248,113,113,.3); }
.alert-success { background: var(--green-dim); color: var(--green); border: 1px solid rgba(74,222,128,.3); }
.progress-bar { height: 8px; background: rgba(255,255,255,.06); border-radius: 4px; overflow: hidden; margin-top: 4px; }
.progress-fill { height: 100%; border-radius: 4px; transition: width .6s cubic-bezier(.4,0,.2,1); }
.progress-fill.safe { background: linear-gradient(90deg, var(--green) 0%, #4ade80 100%); }
.progress-fill.warn { background: linear-gradient(90deg, var(--amber) 0%, #f59e0b 100%); }
.progress-fill.danger { background: linear-gradient(90deg, var(--red) 0%, #dc2626 100%); }
.toast { position: fixed; top: 80px; right: 20px; z-index: 9999; padding: 12px 20px; border-radius: var(--radius-sm); font-weight: 600; animation: toastIn .35s cubic-bezier(.4,0,.2,1); max-width: 360px; font-size: .85rem; box-shadow: var(--shadow-lg); border: 1px solid; }
.toast.success { background: var(--surface); border-color: var(--green); color: var(--green); }
.toast.error { background: var(--surface); border-color: var(--red); color: var(--red); }
.toast.warning { background: var(--surface); border-color: var(--amber); color: var(--amber); }
@keyframes toastIn { from { transform: translateX(120%) translateY(-10px); opacity: 0; } to { transform: translateX(0) translateY(0); opacity: 1; } }
.tag { display: inline-block; padding: 3px 12px; border-radius: 20px; font-size: 0.78rem; font-weight: 600; }
.tag-income { background: var(--green-dim); color: var(--green); }
.tag-expense { background: var(--red-dim); color: var(--red); }
.tag-transfer { background: rgba(167,139,250,.15); color: var(--purple); }
.empty-state { text-align: center; padding: 40px 20px; color: var(--text2); }
.empty-state .icon { font-size: 2.5rem; margin-bottom: 10px; }
.category-block { border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; background: var(--surface2); transition: all var(--transition); }
.category-block:hover { border-color: var(--text2); }
.category-block .cat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.category-block .cat-name { font-weight: 700; font-size: 0.95rem; }
.category-block .sub-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.category-block .sub-tag { background: var(--surface); padding: 4px 10px; border-radius: 20px; font-size: 0.78rem; display: inline-flex; align-items: center; gap: 4px; }
.category-block .sub-tag .remove { cursor: pointer; color: var(--red); font-weight: bold; margin-left: 2px; }
.inline-input { background: var(--surface2); border: 1.5px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: var(--radius-sm); font-size: 0.85rem; width: 100%; font-family: inherit; transition: border-color var(--transition); }
.inline-input:focus { outline: none; border-color: var(--green); }
.budget-badge { display: none; vertical-align: middle; margin-left: 4px; padding: 1px 6px; border-radius: 10px; font-size: .6rem; font-weight: 700; line-height: 1.4; }
.budget-badge.danger { display: inline-block; background: var(--red); color: #fff; }
.budget-badge.warning { display: inline-block; background: var(--amber); color: #000; }
.account-pills { display: flex; gap: 8px; flex-wrap: wrap; }
.account-pill { padding: 10px 18px; border-radius: 24px; cursor: pointer; font-size: 0.85rem; font-weight: 600; border: 2px solid transparent; transition: all .15s; text-align: center; }
.account-pill:hover { opacity: 0.85; }
.account-pill.selected { border-color: #fff; box-shadow: 0 0 10px rgba(255,255,255,.2); }
.account-pill.acct-0 { background: rgba(96,165,250,.25); color: var(--blue); }
.account-pill.acct-1 { background: rgba(248,113,113,.25); color: var(--red); }
.account-pill.acct-2 { background: rgba(167,139,250,.25); color: var(--purple); }
.account-pill.acct-3 { background: rgba(251,191,36,.25); color: var(--amber); }
.account-pill.acct-4 { background: rgba(34,211,238,.25); color: var(--cyan); }
.account-pill.acct-5 { background: rgba(244,114,182,.25); color: var(--pink); }
.account-info { display: flex; align-items: center; gap: 6px; }
.account-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
.account-dot.acct-0 { background: var(--blue); }
.account-dot.acct-1 { background: var(--red); }
.account-dot.acct-2 { background: var(--purple); }
.account-dot.acct-3 { background: var(--amber); }
.account-dot.acct-4 { background: var(--cyan); }
.account-dot.acct-5 { background: var(--pink); }
.filter-pills { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
.filter-pill { padding: 6px 16px; border-radius: 20px; cursor: pointer; font-size: 0.85rem; font-weight: 500; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); transition: all .12s; }
.filter-pill:hover { border-color: var(--green); color: var(--text); }
.filter-pill.active { background: rgba(74,222,128,.15); border-color: var(--green); color: var(--green); }
.budget-summary { background: linear-gradient(135deg, var(--surface2) 0%, #474774 100%); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; }
.budget-summary-main { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; font-size: .9rem; }
.budget-summary-main strong { font-size: 1.1rem; }
.budget-category-card { background: linear-gradient(135deg, var(--surface2) 0%, #474774 100%); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; border-left: 4px solid var(--green); }
.budget-cat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; flex-wrap: wrap; gap: 6px; }
.budget-cat-name { font-weight: 700; font-size: 1rem; }
.budget-cat-total { font-size: .85rem; color: var(--text2); }
.budget-sub-header { display: grid; grid-template-columns: 1fr 90px 90px 100px; gap: 6px; padding: 6px 0; font-size: .78rem; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; font-weight: 600; border-bottom: 1px solid var(--border); }
.budget-sub-row { display: grid; grid-template-columns: 1fr 90px 90px 100px; gap: 6px; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: .85rem; }
.budget-sub-row:last-child { border-bottom: none; }
.budget-sub-name { font-weight: 500; }
.budget-sub-spent { text-align: right; font-variant-numeric: tabular-nums; }
.budget-sub-spent.red { color: var(--red); font-weight: 600; }
.budget-sub-bar { display: flex; align-items: center; gap: 6px; }
/* Home grid */
.home-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
.home-card { background: linear-gradient(135deg, var(--surface2) 0%, #474774 100%); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 8px; text-align: center; cursor: pointer; transition: all var(--transition); }
.home-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); border-color: var(--green); }
.home-card .home-icon { width: 28px; height: 28px; display: block; margin: 0 auto 6px; color: var(--green); }
.home-card .home-label { font-size: .82rem; font-weight: 600; color: var(--text); }
.home-quick { background: linear-gradient(135deg, var(--surface2) 0%, #474774 100%); border-radius: var(--radius); padding: 16px; }
.home-quick-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: .9rem; }
.home-quick-row:last-child { border-bottom: none; }
.home-quick-row .label { color: var(--text2); }
.home-quick-row .value { font-weight: 700; }
/* Resumen */
.resumen-section { margin-bottom: 20px; }
.resumen-section h3 { font-size: 1rem; margin-bottom: 12px; color: var(--text); display: flex; align-items: center; gap: 6px; }
.resumen-table { width: 100%; font-size: .85rem; }
.resumen-table td { padding: 6px 10px; }
.resumen-table .cat-row td { font-weight: 600; color: var(--text); padding-top: 10px; }
.resumen-table .sub-row td { padding-left: 24px; color: var(--text2); font-size: .8rem; }
.resumen-table .total-row td { font-weight: 700; padding-top: 10px; border-top: 2px solid var(--border); font-size: .9rem; }
.resumen-table .right { text-align: right; font-variant-numeric: tabular-nums; }
@media (max-width: 768px) {
  .home-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .home-card { padding: 12px 6px; }
  .tabs-desktop { display: none; }
  .tabs-mobile { display: flex; }
  main { padding-bottom: 80px; }
  .form-row { grid-template-columns: 1fr; }
  .charts-row { grid-template-columns: 1fr; }
  .metrics { grid-template-columns: repeat(2, 1fr); }
  .budget-row { grid-template-columns: 1.5fr 1fr 1fr; }
  .budget-sub-header { grid-template-columns: 1fr 70px 70px 80px; font-size: .6rem; }
  .budget-sub-row { grid-template-columns: 1fr 70px 70px 80px; gap: 4px; }
  .budget-cat-header { flex-direction: column; align-items: flex-start; }
  header h1 { font-size: 1.1rem; }
  .metric .value { font-size: 1.3rem; }
  .card { padding: 16px; }
}
</style>

<body>
<div id="authOverlay" style="position:fixed;inset:0;background:var(--bg);z-index:9999;display:none;align-items:center;justify-content:center;flex-direction:column;padding:20px">
  <div style="text-align:center;max-width:380px;width:100%">
    <div style="font-size:3rem;margin-bottom:8px">💰</div>
    <h1 style="color:var(--green);margin-bottom:4px">FINANZAS PITI</h1>
    <p style="color:var(--text2);margin-bottom:20px;font-size:.9rem">Conecta tu cuenta para sincronizar entre dispositivos</p>
    <div id="authForm">
      <div class="form-group"><label>Email</label><input type="email" id="authEmail" placeholder="tu@email.com"></div>
      <div class="form-group"><label>Contraseña</label><input type="password" id="authPass" placeholder="Minimo 6 caracteres"></div>
      <button class="btn btn-primary" onclick="doLogin()" style="width:100%;margin-bottom:8px">Iniciar Sesion</button>
      <button class="btn btn-outline" onclick="doRegister()" style="width:100%;margin-bottom:8px">Crear Cuenta</button>
      <button class="btn btn-sm btn-outline" onclick="hideLogin()" style="width:100%">Cancelar</button>
      <div id="authError" style="color:var(--red);font-size:.8rem;margin-top:8px;min-height:20px"></div>
      <div id="authInfo" style="color:var(--text2);font-size:.75rem;margin-top:12px"><p>Usa el mismo email y contrasena en PC y iPhone.</p></div>
    </div>
    <div id="authLoading" style="display:none;color:var(--green);padding:20px"><p>Conectando...</p></div>
  </div>
</div>
<header>
  <h1>FINANZAS PITI</h1>
  <div class="month-selector">
    <button class="btn btn-sm btn-outline" onclick="changeMonth(-1)">&#9664;</button>
    <select id="monthSelect" onchange="onMonthChange()">
      <option value="2026-01">Enero 2026</option><option value="2026-02">Febrero 2026</option>
      <option value="2026-03">Marzo 2026</option><option value="2026-04">Abril 2026</option>
      <option value="2026-05">Mayo 2026</option><option value="2026-06">Junio 2026</option>
      <option value="2026-07" selected>Julio 2026</option><option value="2026-08">Agosto 2026</option>
      <option value="2026-09">Septiembre 2026</option><option value="2026-10">Octubre 2026</option>
      <option value="2026-11">Noviembre 2026</option><option value="2026-12">Diciembre 2026</option>
    </select>
    <button class="btn btn-sm btn-outline" onclick="changeMonth(1)">&#9654;</button>
  </div>
  <span id="syncBadge"></span>
</header>
<nav class="tabs-desktop" id="tabs">
  <button data-tab="inicio" class="active"><svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> Inicio</button>
  <button data-tab="registrar"><svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg> Registrar</button>
  <button data-tab="dashboard"><svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg> Panel</button>

<main id="main"></main>
<div id="toastContainer"></div>
<script>
'use strict';
window.onerror = function(msg, url, line) { document.getElementById('main').innerHTML = '<div class="card"><h2>Error</h2><p style="color:var(--red)">'+msg+' (linea '+line+')</p><p style="color:var(--text2);font-size:.8rem">Recarga la pagina con Ctrl+Shift+R</p></div>'; return false; };

// ===== Firebase (opcional, no bloquea) =====
const FB_CONFIG = {
  apiKey: "AIzaSyA2sXUYBPt83c9Cn8V3kBec3fcUjKl7Oc0",
  authDomain: "finanzas-piti.firebaseapp.com",
  projectId: "finanzas-piti",
  storageBucket: "finanzas-piti.firebasestorage.app",
  messagingSenderId: "849949233187",
  appId: "1:849949233187:web:f235b9d9db67cff023e196"
};
let fbDb = null, fbAuth = null, fbUid = null, fbReady = false;

function updateSyncBadge() {
  var el = document.getElementById('syncBadge'); if (!el) return;
  if (fbUid) {
    el.innerHTML = '<span class="account-dot acct-0" style="vertical-align:middle;margin-right:4px"></span><span style="color:var(--green);font-size:.8rem">Conectado</span> <button class="btn btn-sm btn-outline" onclick="doLogout()" style="font-size:.65rem;padding:2px 8px">Salir</button>';
  } else if (fbReady && !fbUid) {
    el.innerHTML = '<button class="btn btn-sm btn-primary" onclick="showLogin()" style="font-size:.7rem;padding:4px 10px">Conectar</button>';
  } else {
    el.innerHTML = '<span style="color:var(--text2);font-size:.75rem">Local</span>';
  }
}

function initFirebase() {
  if (typeof firebase === 'undefined') { updateSyncBadge(); return; }
  try {
    if (!firebase.apps.length) firebase.initializeApp(FB_CONFIG);
    fbDb = firebase.firestore(); fbAuth = firebase.auth();
    fbDb.enablePersistence({ synchronizeTabs: true }).catch(function(){});
    fbAuth.onAuthStateChanged(function(user) {
      if (user) { fbUid = user.uid; fbReady = true; updateSyncBadge(); syncFromCloud(); }
      else { fbUid = null; fbReady = true; updateSyncBadge(); }
    });
    fbReady = true; updateSyncBadge();
  } catch(e) { fbReady = false; updateSyncBadge(); }
}

function showLogin() {
  document.getElementById('authOverlay').style.display = 'flex';
  document.getElementById('authForm').style.display = 'block';
  document.getElementById('authLoading').style.display = 'none';
  document.getElementById('authError').textContent = '';
}
function hideLogin() { document.getElementById('authOverlay').style.display = 'none'; }

function doLogin() {
  var email = document.getElementById('authEmail').value.trim();
  var pass = document.getElementById('authPass').value;
  if (!email || !pass) { document.getElementById('authError').textContent = 'Completa email y contrasena'; return; }
  document.getElementById('authForm').style.display = 'none';
  document.getElementById('authLoading').style.display = 'block';
  fbAuth.signInWithEmailAndPassword(email, pass).then(function() {
    hideLogin(); toast('Conectado a la nube!', 'success');
  }).catch(function(e) {
    document.getElementById('authForm').style.display = 'block';
    document.getElementById('authLoading').style.display = 'none';
    document.getElementById('authError').textContent = authErrorMsg(e.code);
  });
}
function doRegister() {
  var email = document.getElementById('authEmail').value.trim();
  var pass = document.getElementById('authPass').value;
  if (!email || !pass) { document.getElementById('authError').textContent = 'Completa email y contrasena'; return; }
  if (pass.length < 6) { document.getElementById('authError').textContent = 'Minimo 6 caracteres'; return; }
  document.getElementById('authForm').style.display = 'none';
  document.getElementById('authLoading').style.display = 'block';
  fbAuth.createUserWithEmailAndPassword(email, pass).then(function() {
    hideLogin(); toast('Cuenta creada y conectada!', 'success');
  }).catch(function(e) {
    document.getElementById('authForm').style.display = 'block';
    document.getElementById('authLoading').style.display = 'none';
    document.getElementById('authError').textContent = authErrorMsg(e.code);
  });
}
function doLogout() { if (confirm('Cerrar sesion?')) fbAuth.signOut(); }
function authErrorMsg(code) {
  var m = { 'auth/email-already-in-use':'Este email ya tiene cuenta', 'auth/invalid-email':'Email no valido', 'auth/weak-password':'Contrasena muy debil', 'auth/user-not-found':'Cuenta no encontrada', 'auth/wrong-password':'Contrasena incorrecta', 'auth/invalid-credential':'Email o contrasena incorrectos', 'auth/too-many-requests':'Demasiados intentos', 'auth/network-request-failed':'Error de conexion' };
  return m[code] || code;
}

function syncFromCloud() {
  if (!fbUid || !fbDb) return;
  fbDb.collection('users').doc(fbUid).collection('data').doc('state').get().then(function(doc) {
    if (doc.exists && doc.data().updatedAt) {
      var d = doc.data();
      var cloudTS = d.updatedAt ? d.updatedAt.toMillis() : 0;
      var localTS = LS.get('syncedAt', 0);
      if (cloudTS > localTS && d.transactions && d.transactions.length > 0) {
        if (d.categories) state.categories = d.categories;
        if (d.accounts) { state.accounts = d.accounts; if (state.accounts.length > 0 && typeof state.accounts[0] === 'string') { state.accounts = state.accounts.map(function(n){return{name:n,balance:0};}); } }
        if (d.transactions) state.transactions = d.transactions;
        if (d.budgets) state.budgets = d.budgets;
        LS.set('syncedAt', cloudTS);
        saveLocal();
        renderCurrentTab();
      }
    }
    syncToCloud();
  }).catch(function(){});
}

function syncToCloud() {
  if (!fbUid || !fbDb) return;
  fbDb.collection('users').doc(fbUid).collection('data').doc('state').set({
    categories: state.categories, accounts: state.accounts,
    transactions: state.transactions, budgets: state.budgets,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  }, { merge: true }).then(function() {
    LS.set('syncedAt', Date.now());
  }).catch(function(){});
}

function saveLocal() { LS.set('categories', state.categories); LS.set('transactions', state.transactions); LS.set('budgets', state.budgets); LS.set('accounts', state.accounts); }
function saveAll() { saveLocal(); LS.set('syncedAt', Date.now()); if (fbUid && fbDb) syncToCloud(); }

const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const COLORS = ['#4ade80','#60a5fa','#f472b6','#fbbf24','#a78bfa','#22d3ee','#f87171','#fb923c','#34d399','#818cf8','#e879f9','#fcd34d','#38bdf8','#a3e635','#c084fc','#fda4af'];

const DEFAULT_CATEGORIES = [
  { name: 'COMIDA', type: 'expense', subcategories: ['Supermercado / Despensa','Comida rapida','Salidas'] },
  { name: 'VIVIENDA', type: 'expense', subcategories: ['Arriendo / Hipoteca','Servicios publicos','Mantención','Seguro hogar'] },
  { name: 'TRANSPORTE', type: 'expense', subcategories: ['Transporte publico','Viaje de trabajo','Uber / Taxi'] },
  { name: 'AUTO', type: 'expense', subcategories: ['Bencina','Mantención','Estacionamiento','Seguro de auto','Mecanico'] },
  { name: 'VIDA', type: 'expense', subcategories: ['Atencion medica','Belleza y bienestar','Eventos de la vida','Aficiones','Desarrollo personal','Suscripciones','Ocio / Tiempo libre'] },
  { name: 'COMPRAS', type: 'expense', subcategories: ['Electronica'] },
  { name: 'INGRESOS E INVERSIONES', type: 'income', subcategories: ['Sueldo Liquido','Otros Ingresos / Ventas','Reembolsos','Ahorros','Inversiones'] }
];

function uid() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 6); }
function fmt(n) { return '$' + Number(n || 0).toLocaleString('es-CL'); }
function monthName(key) { const [y,m] = key.split('-'); return MONTHS[parseInt(m)-1] + ' ' + y; }
function nowKey() { const d = new Date(); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0'); }

const LS = {
  get(k, def) { try { const v = localStorage.getItem('fnz_'+k); return v ? JSON.parse(v) : def; } catch(e) { return def; } },
  set(k, v) { localStorage.setItem('fnz_'+k, JSON.stringify(v)); }
};

let state = {
  categories: LS.get('categories', null),
  transactions: LS.get('transactions', []),
  budgets: LS.get('budgets', {}),
  accounts: LS.get('accounts', null),
  currentMonth: nowKey(),
  currentTab: 'inicio'
};
if (!state.categories) { state.categories = JSON.parse(JSON.stringify(DEFAULT_CATEGORIES)); LS.set('categories', state.categories); }
if (!state.accounts) { state.accounts = [{name:'Banco Santander',balance:0},{name:'Banco de Chile',balance:0},{name:'Mercado Pago',balance:0}]; LS.set('accounts', state.accounts); }
// Migrate old format (array of strings) to new format (array of objects)
if (state.accounts.length > 0 && typeof state.accounts[0] === 'string') {
  state.accounts = state.accounts.map(function(n) { return {name:n, balance:0}; });
  LS.set('accounts', state.accounts);
}

function getAccountColor(i) { return 'acct-' + (i % 6); }
function acctName(i) { return (state.accounts[i] && state.accounts[i].name) || state.accounts[i] || ''; }
function acctIdx(name) { for (var i=0;i<state.accounts.length;i++) { if (state.accounts[i].name === name) return i; } return -1; }

function getAccountAllIncome(account) { return state.transactions.filter(function(t){return t.type==='income' && t.account===account;}).reduce(function(s,t){return s+t.amount;},0); }
function getAccountAllExpense(account) { return state.transactions.filter(function(t){return t.type==='expense' && t.account===account;}).reduce(function(s,t){return s+t.amount;},0); }
function getAccountTransfersOut(account) { return state.transactions.filter(function(t){return t.type==='transfer' && t.account===account;}).reduce(function(s,t){return s+t.amount;},0); }
function getAccountTransfersIn(account) { return state.transactions.filter(function(t){return t.type==='transfer' && t.toAccount===account;}).reduce(function(s,t){return s+t.amount;},0); }
function getAccountBalance(account) {
  var bal = 0;
  for (var i=0;i<state.accounts.length;i++) { if (state.accounts[i].name===account) { bal = state.accounts[i].balance || 0; break; } }
  return bal + getAccountAllIncome(account) - getAccountAllExpense(account) - getAccountTransfersOut(account) + getAccountTransfersIn(account);
}

function getTxByMonth(month) { return state.transactions.filter(t => t.date.startsWith(month)); }
function getIncomeTotal(month) { return getTxByMonth(month).filter(t => t.type === 'income').reduce((s,t) => s + t.amount, 0); }
function getExpenseTotal(month) { return getTxByMonth(month).filter(t => t.type === 'expense').reduce((s,t) => s + t.amount, 0); }
function getBudgetTotal(month) { const b = state.budgets[month] || {}; return Object.values(b).reduce((s,v) => s + v, 0); }
function getExpenseBySubcat(month) {
  const map = {};
  getTxByMonth(month).filter(t => t.type === 'expense').forEach(t => {
    const key = t.category + '|' + t.subcategory;
    map[key] = (map[key] || 0) + t.amount;
  });
  return map;
}
function getTransferTotal(month) { return getTxByMonth(month).filter(t => t.type === 'transfer').reduce((s,t) => s + t.amount, 0); }
function getIncomeCategories() { return state.categories.filter(c => c.type === 'income'); }
function getExpenseCategories() { return state.categories.filter(c => c.type === 'expense'); }
function allExpenseSubcats() { let r = []; getExpenseCategories().forEach(c => c.subcategories.forEach(s => r.push({cat: c.name, sub: s}))); return r; }
function allIncomeSubcats() { let r = []; getIncomeCategories().forEach(c => c.subcategories.forEach(s => r.push({cat: c.name, sub: s}))); return r; }

function getAccountMovements(month, account) { return getTxByMonth(month).filter(t => (t.account || acctName(0)) === account); }
function getAccountIncome(month, account) { return getAccountMovements(month, account).filter(t => t.type === 'income').reduce((s,t) => s + t.amount, 0); }
function getAccountExpense(month, account) { return getAccountMovements(month, account).filter(t => t.type === 'expense').reduce((s,t) => s + t.amount, 0); }
function sendNotification(title, body) {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'granted') new Notification(title, {body:body, icon:'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 192 192%22><rect width=%22192%22 height=%22192%22 rx=%2240%22 fill=%22%230f0f14%22/><text x=%2296%22 y=%22116%22 text-anchor=%22middle%22 font-size=%2290%22 fill=%22%234ade80%22>$</text></svg>'});
  else if (Notification.permission !== 'denied') Notification.requestPermission().then(function(p){if(p==='granted')new Notification(title,{body:body});});
}

function getBudgetAlerts() {
  const month = state.currentMonth, expenseMap = getExpenseBySubcat(month);
  var alerts = [];
  allExpenseSubcats().forEach(function(sc) {
    var k = sc.cat+'|'+sc.sub, budget = (state.budgets[month]||{})[k]||0, spent = expenseMap[k]||0;
    if (budget > 0) { var pct = Math.round(spent/budget*100); if (pct >= 100) alerts.push({type:'danger',cat:sc.cat,sub:sc.sub,budget:budget,spent:spent,pct:pct}); else if(pct>=80) alerts.push({type:'warning',cat:sc.cat,sub:sc.sub,budget:budget,spent:spent,pct:pct}); }
  });
  return alerts;
}
function getAlertCount() { var a = getBudgetAlerts(); return {danger:a.filter(function(x){return x.type==='danger';}).length, warning:a.filter(function(x){return x.type==='warning';}).length, total:a.length}; }
function toast(msg, type) {
  const el = document.createElement('div'); el.className = 'toast ' + (type||'success');
  el.innerHTML = msg;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => el.remove(), 3200);
}

function pieChart(container, data) {
  const total = data.reduce((s,d) => s + d.value, 0);
  if (total === 0) { container.innerHTML = '<div class="empty-state"><div class="icon">&#128202;</div><p>Sin datos este mes</p></div>'; return; }
  const w = 240, h = 240, cx = w/2, cy = h/2, r = 95, ir = 55;
  let svg = '<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'" style="max-width:100%"><g transform="translate('+cx+','+cy+')">';
  // Donut segments with subtle shadow
  svg += '<filter id="ds"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity=".3"/></filter>';
  let angle = -Math.PI / 2;
  data.forEach((d, i) => {
    const slice = (d.value / total) * 2 * Math.PI;
    const x1 = Math.cos(angle) * r, y1 = Math.sin(angle) * r;
    const x2 = Math.cos(angle + slice) * r, y2 = Math.sin(angle + slice) * r;
    const xi1 = Math.cos(angle) * ir, yi1 = Math.sin(angle) * ir;
    const xi2 = Math.cos(angle + slice) * ir, yi2 = Math.sin(angle + slice) * ir;
    const large = slice > Math.PI ? 1 : 0;
    svg += '<path d="M '+x1+' '+y1+' A '+r+' '+r+' 0 '+large+' 1 '+x2+' '+y2+' L '+xi2+' '+yi2+' A '+ir+' '+ir+' 0 '+large+' 0 '+xi1+' '+yi1+' Z" fill="'+COLORS[i % COLORS.length]+'" filter="url(#ds)"/>';
    angle += slice;
  });
  svg += '<circle r="'+(ir-2)+'" fill="var(--surface2)"/><text text-anchor="middle" dy="-6" fill="var(--text)" font-size="16" font-weight="800">'+fmt(total)+'</text><text text-anchor="middle" dy="14" fill="var(--text2)" font-size="11">Total gastos</text></g></svg>';
  let legend = '<div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:12px;max-height:120px;overflow-y:auto">';

function onTxTypeChange() {

  const transRow = document.getElementById('gTransferRow');

function addTransaction() {
  const type = document.getElementById('txType').value;
  const date = document.getElementById('txDate').value;
  const description = document.getElementById('txDesc').value;
  if (type === 'transfer') {
    const fromAcct = document.getElementById('txFromAcct').value;
    const toAcct = document.getElementById('txToAcct').value;
    const amount = parseInt(document.getElementById('txAmountT').value) || 0;
    if (!fromAcct || !toAcct || fromAcct === toAcct) return toast('Selecciona cuentas distintas para transferir', 'error');
    if (amount <= 0) return toast('Ingresa un monto', 'error');
    state.transactions.push({ id: uid(), type: 'transfer', account: fromAcct, toAccount: toAcct, amount: amount, date: date, description: description || '' });
    saveAll(); document.getElementById('txAmountT').value = ''; document.getElementById('txDesc').value = '';
    toast('Transferencia guardada!', 'success');
  } else {
    const category = document.getElementById('txCat').value;
    const subcategory = document.getElementById('txSub').value;
    const amount = parseInt(document.getElementById('txAmount').value) || 0;
    const account = window._selAcct || acctName(0);
    if (!category || !subcategory || amount <= 0) return toast('Completa categoria, subcategoria y monto', 'error');
    state.transactions.push({ id: uid(), type: type, category: category, subcategory: subcategory, amount: amount, date: date, description: description || '', account: account });
    saveAll(); document.getElementById('txAmount').value = ''; document.getElementById('txDesc').value = '';
    // Check budget alert
    var k = category+'|'+subcategory, month = state.currentMonth, budget = (state.budgets[month]||{})[k]||0;
    if (budget > 0) {
      var spent = getExpenseBySubcat(month)[k]||0, pct = Math.round(spent/budget*100);
      if (pct >= 100) { toast('Se excedió el presupuesto de '+subcategory+'! Gastado '+fmt(spent)+' de '+fmt(budget), 'error'); sendNotification('Presupuesto excedido', subcategory+' gastaste '+fmt(spent)+' de '+fmt(budget)); }
      else if (pct >= 80) toast('Cuidado: '+subcategory+' al '+pct+'% del presupuesto ('+fmt(spent)+' de '+fmt(budget)+')', 'warning');
    }
    updateBudgetBadge();
    toast('Movimiento guardado!', 'success');
  }
}

// ---------- Planificacion ----------
function renderPlanificacion() {

    cat.subcategories.forEach(sub => {

function copyPreviousBudget() {
  const month = state.currentMonth, prevKey = getPrevMonthKey(month);
  if (!state.budgets[prevKey]) return toast('No hay presupuesto del mes anterior', 'error');
  state.budgets[month] = JSON.parse(JSON.stringify(state.budgets[prevKey])); saveAll(); renderPlanificacion();
  toast('Copiado del mes anterior!', 'success');
}
function getPrevMonthKey(key) { const d = new Date(key+'-01'); d.setMonth(d.getMonth()-1); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function saveBudget(key) {
  const el = document.getElementById('budget_' + key.replace(/[^a-zA-Z0-9]/g,'_'));
  if (!el) return;
  if (!state.budgets[state.currentMonth]) state.budgets[state.currentMonth] = {};

}
function saveAllBudgets() {

  allExpenseSubcats().forEach(sc => { const k = sc.cat+'|'+sc.sub, el = document.getElementById('budget_'+k.replace(/[^a-zA-Z0-9]/g,'_')); if (el) state.budgets[month][k] = parseInt(el.value)||0; });
  saveAll(); toast('Presupuestos guardados!', 'success');
}

function getYearTotal(year, type) { return state.transactions.filter(t => t.type===type&&t.date.startsWith(year)).reduce((s,t)=>s+t.amount,0); }

// ---------- Movimientos ----------
function renderMovimientos() {
  const month = state.currentMonth;
  let tx = getTxByMonth(month); tx.sort((a,b) => new Date(b.date)-new Date(a.date));
  let html = '<div class="card"><h2>Movimientos - '+monthName(month)+'</h2><div class="filter-pills"><span class="filter-pill active" onclick="filterTxs(\'Todas\')">Todas</span>';
  state.accounts.forEach(function(a,i) { html += '<span class="filter-pill" onclick="filterTxs(\''+a.name+'\')"><span class="account-dot '+getAccountColor(i)+'" style="display:inline-block;vertical-align:middle"></span> '+a.name+'</span>'; });
  html += '</div><button class="btn btn-sm btn-outline" onclick="deleteAllMonth()" style="margin-bottom:8px">Borrar todos</button><div id="movTableContainer">';
  window._movTx = tx; window._movFilter = 'Todas';

  document.getElementById('main').innerHTML = html;
}
function renderMovTable(txList) {
  if (txList.length === 0) return '<div class="empty-state"><div class="icon">&#128236;</div><p>Sin movimientos</p></div>';
  let h = '<table><thead><tr><th>Fecha</th><th>Tipo</th><th>Cuenta</th><th>Categoria/Detalle</th><th>Descripcion</th><th>Monto</th><th></th></tr></thead><tbody>';
  txList.forEach(t => {
    if (t.type === 'transfer') {
      h += '<tr><td>'+t.date+'</td><td><span class="tag tag-transfer">Transferencia</span></td><td><span class="account-dot '+getAccountColor(Math.max(0,acctIdx(t.account)))+'" style="vertical-align:middle"></span> '+t.account+' &rarr; <span class="account-dot '+getAccountColor(Math.max(0,acctIdx(t.toAccount)))+'" style="vertical-align:middle"></span> '+t.toAccount+'</td><td>'+t.description+'</td><td>-</td><td class="right" style="color:var(--purple);font-weight:600">'+fmt(t.amount)+'</td><td><button class="btn btn-sm btn-danger" onclick="deleteTx(\''+t.id+'\')">x</button></td></tr>';
    } else {
      const idx = acctIdx(t.account || acctName(0)), cls = getAccountColor(Math.max(0,idx));
      h += '<tr><td>'+t.date+'</td><td><span class="tag '+(t.type==='income'?'tag-income':'tag-expense')+'">'+(t.type==='income'?'Ingreso':'Gasto')+'</span></td><td><span class="account-dot '+cls+'" style="vertical-align:middle"></span> '+(t.account||acctName(0))+'</td><td>'+t.category+' / '+t.subcategory+'</td><td>'+(t.description||'-')+'</td><td class="right '+(t.type==='income'?'green':'red')+'">'+fmt(t.amount)+'</td><td><button class="btn btn-sm btn-danger" onclick="deleteTx(\''+t.id+'\')">x</button></td></tr>';
    }
  });
  return h + '</tbody></table>';
}
function filterTxs(account) {
  window._movFilter = account;
  const filtered = account==='Todas' ? window._movTx : window._movTx.filter(t => (t.account||acctName(0))===account);
  document.querySelectorAll('.filter-pill').forEach(p => { p.classList.remove('active'); if (p.textContent.replace(/^\s*\u25CF\s*/,'').trim()===account) p.classList.add('active'); });
  document.getElementById('movTableContainer').innerHTML = renderMovTable(filtered);
}
function deleteTx(id) { state.transactions = state.transactions.filter(t => t.id!==id); saveAll(); renderMovimientos(); toast('Eliminado', 'success'); }
function deleteAllMonth() { if(!confirm('Borrar TODOS los movimientos de este mes?'))return; state.transactions=state.transactions.filter(t=>!t.date.startsWith(state.currentMonth));saveAll();renderMovimientos();toast('Borrados','success'); }

function addCategory() {
  const name = document.getElementById('newCatName').value.trim(), type = document.getElementById('newCatType').value;
  if (!name) return toast('Escribe un nombre', 'error');
  if (state.categories.find(c => c.name===name)) return toast('Ya existe', 'error');
  state.categories.push({name,type,subcategories:[]}); saveAll(); renderConfiguracion(); toast('Creada: '+name, 'success');
}
function deleteCategory(name) {
  if (!confirm('Eliminar "'+name+'"?')) return;
  state.categories = state.categories.filter(c => c.name!==name); saveAll(); renderConfiguracion(); toast('Eliminada', 'success');
}
function addSubcategory(catName) {
  const el = document.getElementById('newSub_'+catName.replace(/[^a-zA-Z0-9]/g,'_'));
  const val = (el.value||'').trim(); if (!val) return toast('Escribe un nombre', 'error');
  const cat = state.categories.find(c => c.name===catName); if (!cat) return;
  if (cat.subcategories.includes(val)) return toast('Ya existe', 'error');
  cat.subcategories.push(val); saveAll(); el.value = ''; renderConfiguracion(); toast('Agregada', 'success');
}
function deleteSubcategory(catName, sub) {
  const cat = state.categories.find(c => c.name===catName); if (!cat) return;
  cat.subcategories = cat.subcategories.filter(s => s!==sub); saveAll(); renderConfiguracion(); toast('Eliminada', 'success');
}
function addAccount() {
  var name = document.getElementById('newAcctName').value.trim();
  var bal = parseInt(document.getElementById('newAcctBal').value) || 0;
  if (!name) return toast('Escribe un nombre', 'error');
  if (state.accounts.some(function(a){return a.name===name;})) return toast('Ya existe', 'error');
  state.accounts.push({name:name, balance:bal}); saveAll(); renderConfiguracion(); toast('Cuenta: '+name, 'success');
}
function renameAccount(i) {
  var el = document.getElementById('renameAcct_'+i), name = (el.value||'').trim();
  var bal = parseInt(document.getElementById('balAcct_'+i).value) || 0;
  if (!name) return toast('Escribe un nombre', 'error');
  if (state.accounts.some(function(a,j){return j!==i && a.name===name;})) return toast('Nombre duplicado', 'error');
  var old = state.accounts[i].name; state.accounts[i].name = name; state.accounts[i].balance = bal;
  state.transactions.forEach(function(t){if(t.account===old)t.account=name;if(t.toAccount===old)t.toAccount=name;});
  saveAll(); renderConfiguracion(); toast('Cuenta actualizada', 'success');
}
function deleteAccount(i) {
  var acc = state.accounts[i]; if (!confirm('Eliminar "'+acc.name+'"?')) return;
  var fallback = state.accounts.length > 1 ? (i===0 ? state.accounts[1].name : state.accounts[0].name) : 'General';
  state.accounts.splice(i, 1);
  state.transactions.forEach(function(t){if(t.account===acc.name)t.account=fallback;if(t.toAccount===acc.name)t.toAccount=fallback;});
  saveAll(); renderConfiguracion(); toast('Eliminada', 'success');
}

// ---------- Datos ----------
function renderDatos() {
  document.getElementById('main').innerHTML = '<div class="card"><h2>Gestion de Datos</h2><div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px"><button class="btn btn-primary" onclick="exportCSV()">Exportar CSV</button><button class="btn btn-outline" onclick="exportJSON()">Exportar JSON</button></div><div class="form-group"><label>Importar desde CSV</label><input type="file" id="csvFile" accept=".csv" onchange="importCSV(this)"></div><div class="form-group"><label>Importar desde JSON</label><input type="file" id="jsonFile" accept=".json" onchange="importJSONFile(this)"></div><button class="btn btn-danger" onclick="resetAll()" style="margin-top:12px">Reiniciar Todo</button></div><div class="card"><h3>Estadisticas</h3><p style="font-size:.85rem;color:var(--text2)">Transacciones: <strong>'+state.transactions.length+'</strong></p><p style="font-size:.85rem;color:var(--text2)">Categorias: <strong>'+state.categories.length+'</strong></p><p style="font-size:.85rem;color:var(--text2)">Meses con presupuesto: <strong>'+Object.keys(state.budgets).length+'</strong></p></div>';
}
function exportCSV() {
  let csv = 'id,tipo,cuenta,categoria,subcategoria,monto,fecha,descripcion\n';
  state.transactions.forEach(t => { csv += [t.id,t.type,t.account||acctName(0),t.category,t.subcategory,t.amount,t.date,t.description||''].join(',')+'\n'; });
  downloadFile('finanzas2026_movimientos.csv', csv);
}
function exportJSON() { downloadFile('finanzas2026_completo.json', JSON.stringify({accounts:state.accounts,categories:state.categories,transactions:state.transactions,budgets:state.budgets},null,2)); }
function downloadFile(name, content) { const b=new Blob([content],{type:'text/plain'}); const u=URL.createObjectURL(b); const a=document.createElement('a');a.href=u;a.download=name;a.click();URL.revokeObjectURL(u);toast('Descargado: '+name,'success'); }
function importCSV(input) {
  const f=input.files[0]; if(!f)return; const r=new FileReader();
  r.onerror=()=>toast('Error al leer archivo','error');
  r.onload=function(e){
    const lines=e.target.result.split('\n').filter(l=>l.trim()); if(lines.length<2)return toast('Vacio','error');
    let c=0; for(let i=1;i<lines.length;i++){const cols=lines[i].split(',');if(cols.length<7)continue;const tx={id:cols[0]||uid(),type:cols[1],account:cols[2]||acctName(0),category:cols[3],subcategory:cols[4],amount:parseInt(cols[5])||0,date:cols[6],description:cols[7]||''};if(tx.type&&tx.category&&tx.date){state.transactions.push(tx);c++;}}
    saveAll(); toast('Importados '+c+' movimientos','success'); renderCurrentTab();
  }; r.readAsText(f);
}
function importJSONFile(input) {
  const f=input.files[0]; if(!f)return; const r=new FileReader();
  r.onerror=()=>toast('Error al leer archivo','error');
  r.onload=function(e){
    try{const d=JSON.parse(e.target.result);let nTx=0,nBud=0,nAcct=0;
    if(d.accounts&&Array.isArray(d.accounts)){state.accounts=d.accounts;if(state.accounts.length>0&&typeof state.accounts[0]==='string'){state.accounts=state.accounts.map(function(n){return{name:n,balance:0};});}nAcct=d.accounts.length;}
    if(d.categories&&Array.isArray(d.categories)){state.categories=d.categories;}
    if(d.transactions&&Array.isArray(d.transactions)){state.transactions=state.transactions.concat(d.transactions);nTx=d.transactions.length;}
    if(d.budgets&&typeof d.budgets==='object'){Object.assign(state.budgets,d.budgets);nBud=Object.keys(d.budgets).length;}
    state.transactions.forEach(t=>{if(!t.account)t.account=acctName(0);});
    saveAll(); toast('Importado! '+nTx+' mov, '+nBud+' meses'+(nAcct>0?', '+nAcct+' cuentas':''),'success'); renderCurrentTab();
    }catch(err){toast('JSON no valido: '+err.message,'error');}
  }; r.readAsText(f);
}
function resetAll() {
  if(!confirm('Borrar TODO? Primer aviso'))return;
  if(!confirm('SEGURO? No se puede deshacer'))return;
  state.categories=JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));state.transactions=[];state.budgets={};state.accounts=[{name:'Banco Santander',balance:0},{name:'Banco de Chile',balance:0},{name:'Mercado Pago',balance:0}];
  saveAll(); renderDatos(); toast('Reiniciado','success');
}

// ---------- Nav ----------
function updateBudgetBadge() {
  var cnt = getAlertCount(), d = document.getElementById('budgetBadgeDesktop'), m = document.getElementById('budgetBadgeMobile');
  if (!d || !m) return;
  var txt = cnt.danger > 0 ? cnt.danger : (cnt.warning > 0 ? cnt.warning : ''), cls = cnt.danger > 0 ? 'danger' : (cnt.warning > 0 ? 'warning' : '');
  d.textContent = txt; d.className = 'budget-badge' + (cls ? ' '+cls : '');
  m.textContent = txt; m.className = 'budget-badge' + (cls ? ' '+cls : '');
}
function switchTab(tab) {
  state.currentTab = tab;
  document.querySelectorAll('.tabs-desktop button, .tabs-mobile button').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('[data-tab="'+tab+'"]').forEach(b => b.classList.add('active'));
  updateBudgetBadge();
  renderCurrentTab();
}
function renderCurrentTab() {
  switch(state.currentTab) {
    case 'inicio': renderInicio(); break;
    case 'registrar': renderRegistrar(); break;
    case 'dashboard': renderDashboard(); break;
    case 'resumen': renderResumen(); break;
    case 'planificacion': renderPlanificacion(); break;
    case 'proyeccion': renderProyeccion(); break;
    case 'movimientos': renderMovimientos(); break;
    case 'configuracion': renderConfiguracion(); break;
    case 'datos': renderDatos(); break;
    default: renderInicio();
  }
}
function changeMonth(dir) { const sel=document.getElementById('monthSelect'); const idx=sel.selectedIndex+dir; if(idx>=0&&idx<sel.options.length){sel.selectedIndex=idx;onMonthChange();} }
function onMonthChange() { state.currentMonth=document.getElementById('monthSelect').value; LS.set('currentMonth',state.currentMonth); renderCurrentTab(); }

// ---------- Init ----------
document.getElementById('tabs').addEventListener('click', function(e) { var btn = e.target.closest('button'); if (btn && btn.dataset.tab) switchTab(btn.dataset.tab); });
document.getElementById('tabsMobile').addEventListener('click', function(e) { var btn = e.target.closest('button'); if (btn && btn.dataset.tab) switchTab(btn.dataset.tab); });
window.deleteTx=deleteTx; window.addTransaction=addTransaction; window.onTxTypeChange=onTxTypeChange; window.onTxCatChange=onTxCatChange;
window.selectAccount=selectAccount; window.renderAccountPills=renderAccountPills;
window.copyPreviousBudget=copyPreviousBudget; window.saveAllBudgets=saveAllBudgets; window.saveBudget=saveBudget;
window.deleteAllMonth=deleteAllMonth; window.filterTxs=filterTxs;
window.deleteCategory=deleteCategory; window.deleteSubcategory=deleteSubcategory; window.addCategory=addCategory; window.addSubcategory=addSubcategory;
window.addAccount=addAccount; window.renameAccount=renameAccount; window.deleteAccount=deleteAccount;
window.exportCSV=exportCSV; window.exportJSON=exportJSON; window.importCSV=importCSV; window.importJSONFile=importJSONFile;
window.resetAll=resetAll; window.changeMonth=changeMonth; window.onMonthChange=onMonthChange;
window.doLogin=doLogin; window.doRegister=doRegister; window.doLogout=doLogout; window.showLogin=showLogin; window.hideLogin=hideLogin;
window.updateBudgetBadge=updateBudgetBadge; window.sendNotification=sendNotification; window.renderResumen=renderResumen; window.renderInicio=renderInicio;

const savedMonth = LS.get('currentMonth', null);
if (savedMonth) state.currentMonth = savedMonth;
document.getElementById('monthSelect').value = state.currentMonth;
// Migrate old transactions
let migrated=0; state.transactions.forEach(t=>{if(!t.account){t.account=acctName(0);migrated++;}}); if(migrated>0)saveAll();
switchTab('inicio');
// Show budget alerts on load
setTimeout(function() { updateBudgetBadge(); var cnt = getAlertCount(); if (cnt.danger > 0) sendNotification('Finanzas 2026', cnt.danger+' categoría'+(cnt.danger>1?'s':'')+' excedieron su presupuesto este mes'); }, 2000);
// Firebase inicia despues de que la app ya cargo (non-blocking)
setTimeout(function(){ initFirebase(); }, 1000);
</script>
