<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finanzas 2026</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f14;
  --surface: #1a1a24;
  --surface2: #222231;
  --border: #2a2a3a;
  --text: #e0e0e8;
  --text2: #9898a8;
  --green: #4ade80;
  --green2: #22c55e;
  --red: #f87171;
  --red2: #ef4444;
  --amber: #fbbf24;
  --blue: #60a5fa;
  --purple: #a78bfa;
  --cyan: #22d3ee;
  --pink: #f472b6;
  --radius: 10px;
  --shadow: 0 2px 8px rgba(0,0,0,.3);
}
body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.5; }
header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 20px; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
header h1 { font-size: 1.3rem; color: var(--green); font-weight: 700; letter-spacing: 0.5px; }
header .month-selector { display: flex; align-items: center; gap: 8px; }
header .month-selector select { background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; font-size: 0.9rem; cursor: pointer; }
.tabs { display: flex; gap: 2px; background: var(--surface); padding: 6px 8px 0 8px; overflow-x: auto; border-bottom: 1px solid var(--border); position: sticky; top: 60px; z-index: 99; }
.tabs button { background: none; border: none; color: var(--text2); padding: 10px 16px; cursor: pointer; font-size: 0.85rem; border-radius: 8px 8px 0 0; white-space: nowrap; transition: all .15s; min-width: max-content; }
.tabs button:hover { color: var(--text); background: var(--surface2); }
.tabs button.active { color: var(--green); background: var(--bg); font-weight: 600; }
main { max-width: 1100px; margin: 0 auto; padding: 20px 16px 60px; }
h2 { font-size: 1.2rem; margin-bottom: 16px; color: var(--text); }
h3 { font-size: 1rem; margin-bottom: 10px; color: var(--text2); }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 0.8rem; color: var(--text2); margin-bottom: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 0.95rem; font-family: inherit; }
.form-group input:focus, .form-group select:focus { outline: none; border-color: var(--green); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; font-weight: 600; transition: all .15s; }
.btn-primary { background: var(--green2); color: #000; }
.btn-primary:hover { background: var(--green); }
.btn-sm { padding: 6px 12px; font-size: 0.8rem; }
.btn-outline { background: none; border: 1px solid var(--border); color: var(--text); }
.btn-outline:hover { background: var(--surface2); }
.btn-danger { background: var(--red2); color: #fff; }
.btn-danger:hover { background: var(--red); }
.btn-amber { background: var(--amber); color: #000; }
.metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 16px; }
.metric { background: var(--surface2); border-radius: var(--radius); padding: 16px; text-align: center; }
.metric .label { font-size: 0.75rem; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
.metric .value { font-size: 1.6rem; font-weight: 700; margin-top: 4px; }
.metric .value.green { color: var(--green); }
.metric .value.red { color: var(--red); }
.charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.chart-container { background: var(--surface2); border-radius: var(--radius); padding: 16px; text-align: center; }
.chart-container svg { max-width: 100%; height: auto; }
.bar-chart-container { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); }
th { color: var(--text2); font-weight: 600; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; position: sticky; top: 0; background: var(--surface); }
tr:hover { background: var(--surface2); }
td.right { text-align: right; font-variant-numeric: tabular-nums; }
td.green { color: var(--green); font-weight: 600; }
td.red { color: var(--red); font-weight: 600; }
.alert { padding: 12px 16px; border-radius: 6px; margin-bottom: 10px; font-size: 0.85rem; font-weight: 500; }
.alert-warning { background: rgba(251,191,36,.15); color: var(--amber); border: 1px solid rgba(251,191,36,.3); }
.alert-danger { background: rgba(248,113,113,.15); color: var(--red); border: 1px solid rgba(248,113,113,.3); }
.alert-success { background: rgba(74,222,128,.15); color: var(--green); border: 1px solid rgba(74,222,128,.3); }
.progress-bar { height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; margin-top: 4px; }
.progress-fill { height: 100%; border-radius: 4px; transition: width .3s; }
.progress-fill.safe { background: var(--green); }
.progress-fill.warn { background: var(--amber); }
.progress-fill.danger { background: var(--red); }
.toast { position: fixed; bottom: 20px; right: 20px; z-index: 999; padding: 14px 20px; border-radius: 8px; font-weight: 600; animation: slideIn .3s; max-width: 360px; font-size: .9rem; }
.toast.success { background: var(--green2); color: #000; }
.toast.error { background: var(--red2); color: #fff; }
.toast.warning { background: var(--amber); color: #000; }
@keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
.tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
.tag-income { background: rgba(74,222,128,.2); color: var(--green); }
.tag-expense { background: rgba(248,113,113,.2); color: var(--red); }
.empty-state { text-align: center; padding: 40px 20px; color: var(--text2); }
.empty-state .icon { font-size: 2.5rem; margin-bottom: 10px; }
.category-block { border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; background: var(--surface2); }
.category-block .cat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.category-block .cat-name { font-weight: 700; font-size: 0.95rem; }
.category-block .sub-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.category-block .sub-tag { background: var(--surface); padding: 4px 10px; border-radius: 20px; font-size: 0.78rem; display: inline-flex; align-items: center; gap: 4px; }
.category-block .sub-tag .remove { cursor: pointer; color: var(--red); font-weight: bold; margin-left: 2px; }
.inline-input { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; width: 100%; font-family: inherit; }
.budget-row { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 8px; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
.budget-row.header { color: var(--text2); font-size: 0.75rem; text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; }
.account-pills { display: flex; gap: 8px; flex-wrap: wrap; }
.account-pill { padding: 10px 18px; border-radius: 24px; cursor: pointer; font-size: 0.85rem; font-weight: 600; border: 2px solid transparent; transition: all .15s; text-align: center; }
.account-pill:hover { opacity: 0.85; }
.account-pill.selected { border-color: #fff; box-shadow: 0 0 10px rgba(255,255,255,.2); }
.account-pill.acct-0 { background: rgba(96,165,250,.25); color: var(--blue); }
.account-pill.acct-1 { background: rgba(248,113,113,.25); color: var(--red); }
.account-pill.acct-2 { background: rgba(167,139,250,.25); color: var(--purple); }
.account-pill.acct-3 { background: rgba(251,191,36,.25); color: var(--amber); }
.account-pill.acct-4 { background: rgba(34,211,238,.25); color: var(--cyan); }
.account-pill.acct-5 { background: rgba(244,114,182,.25); color: var(--pink); }
.account-info { display: flex; align-items: center; gap: 6px; }
.account-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
.account-dot.acct-0 { background: var(--blue); }
.account-dot.acct-1 { background: var(--red); }
.account-dot.acct-2 { background: var(--purple); }
.account-dot.acct-3 { background: var(--amber); }
.account-dot.acct-4 { background: var(--cyan); }
.account-dot.acct-5 { background: var(--pink); }
.filter-pills { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
.filter-pill { padding: 5px 14px; border-radius: 20px; cursor: pointer; font-size: 0.78rem; font-weight: 500; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); transition: all .12s; }
.filter-pill:hover { border-color: var(--green); color: var(--text); }
.filter-pill.active { background: rgba(74,222,128,.15); border-color: var(--green); color: var(--green); }
@media (max-width: 768px) {
  .form-row { grid-template-columns: 1fr; }
  .charts-row { grid-template-columns: 1fr; }
  .metrics { grid-template-columns: repeat(2, 1fr); }
  .tabs { top: 55px; }
  .tabs button { padding: 8px 12px; font-size: 0.78rem; }
  .budget-row { grid-template-columns: 1.5fr 1fr 1fr; }
}
</style>
</head>
<body>
<header>
  <h1>Finanzas 2026</h1>
  <div class="month-selector">
    <button class="btn btn-sm btn-outline" onclick="changeMonth(-1)">&#9664;</button>
    <select id="monthSelect" onchange="onMonthChange()">
      <option value="2026-01">Enero 2026</option><option value="2026-02">Febrero 2026</option>
      <option value="2026-03">Marzo 2026</option><option value="2026-04">Abril 2026</option>
      <option value="2026-05">Mayo 2026</option><option value="2026-06">Junio 2026</option>
      <option value="2026-07" selected>Julio 2026</option><option value="2026-08">Agosto 2026</option>
      <option value="2026-09">Septiembre 2026</option><option value="2026-10">Octubre 2026</option>
      <option value="2026-11">Noviembre 2026</option><option value="2026-12">Diciembre 2026</option>
    </select>
    <button class="btn btn-sm btn-outline" onclick="changeMonth(1)">&#9654;</button>
  </div>
</header>
<nav class="tabs" id="tabs">
  <button data-tab="registrar">Registrar</button>
  <button data-tab="dashboard" class="active">Dashboard</button>
  <button data-tab="planificacion">Planificacion</button>
  <button data-tab="proyeccion">Proyeccion Anual</button>
  <button data-tab="movimientos">Movimientos</button>
  <button data-tab="configuracion">Configuracion</button>
  <button data-tab="datos">Datos</button>
</nav>
<main id="main"></main>
<div id="toastContainer"></div>
<script>
'use strict';
window.onerror = function(msg, url, line) { document.getElementById('main').innerHTML = '<div class="card"><h2>Error</h2><p style="color:var(--red)">'+msg+' (linea '+line+')</p><p style="color:var(--text2);font-size:.8rem">Recarga la pagina con Ctrl+Shift+R</p></div>'; return false; };

const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const COLORS = ['#4ade80','#60a5fa','#f472b6','#fbbf24','#a78bfa','#22d3ee','#f87171','#fb923c','#34d399','#818cf8','#e879f9','#fcd34d','#38bdf8','#a3e635','#c084fc','#fda4af'];

const DEFAULT_CATEGORIES = [
  { name: 'COMIDA', type: 'expense', subcategories: ['Supermercado / Despensa','Comida rapida','Salidas'] },
  { name: 'VIVIENDA', type: 'expense', subcategories: ['Arriendo / Hipoteca','Servicios publicos','Mantención','Seguro hogar'] },
  { name: 'TRANSPORTE', type: 'expense', subcategories: ['Transporte publico','Viaje de trabajo','Uber / Taxi'] },
  { name: 'AUTO', type: 'expense', subcategories: ['Bencina','Mantención','Estacionamiento','Seguro de auto','Mecanico'] },
  { name: 'VIDA', type: 'expense', subcategories: ['Atencion medica','Belleza y bienestar','Eventos de la vida','Aficiones','Desarrollo personal','Suscripciones','Ocio / Tiempo libre'] },
  { name: 'COMPRAS', type: 'expense', subcategories: ['Electronica'] },
  { name: 'INGRESOS E INVERSIONES', type: 'income', subcategories: ['Sueldo Liquido','Otros Ingresos / Ventas','Reembolsos','Ahorros','Inversiones'] }
];

function uid() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 6); }
function fmt(n) { return '$' + Number(n || 0).toLocaleString('es-CL'); }
function monthName(key) { const [y,m] = key.split('-'); return MONTHS[parseInt(m)-1] + ' ' + y; }
function nowKey() { const d = new Date(); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0'); }

const LS = {
  get(k, def) { try { const v = localStorage.getItem('fnz_'+k); return v ? JSON.parse(v) : def; } catch(e) { return def; } },
  set(k, v) { localStorage.setItem('fnz_'+k, JSON.stringify(v)); }
};

let state = {
  categories: LS.get('categories', null),
  transactions: LS.get('transactions', []),
  budgets: LS.get('budgets', {}),
  accounts: LS.get('accounts', null),
  currentMonth: nowKey(),
  currentTab: 'dashboard'
};
if (!state.categories) { state.categories = JSON.parse(JSON.stringify(DEFAULT_CATEGORIES)); LS.set('categories', state.categories); }
if (!state.accounts) { state.accounts = ['Banco Santander', 'Banco de Chile', 'Mercado Pago']; LS.set('accounts', state.accounts); }

function saveAll() { LS.set('categories', state.categories); LS.set('transactions', state.transactions); LS.set('budgets', state.budgets); LS.set('accounts', state.accounts); }
function getAccountColor(i) { return 'acct-' + (i % 6); }

function getTxByMonth(month) { return state.transactions.filter(t => t.date.startsWith(month)); }
function getIncomeTotal(month) { return getTxByMonth(month).filter(t => t.type === 'income').reduce((s,t) => s + t.amount, 0); }
function getExpenseTotal(month) { return getTxByMonth(month).filter(t => t.type === 'expense').reduce((s,t) => s + t.amount, 0); }
function getBudgetTotal(month) { const b = state.budgets[month] || {}; return Object.values(b).reduce((s,v) => s + v, 0); }
function getExpenseBySubcat(month) {
  const map = {};
  getTxByMonth(month).filter(t => t.type === 'expense').forEach(t => {
    const key = t.category + '|' + t.subcategory;
    map[key] = (map[key] || 0) + t.amount;
  });
  return map;
}
function getIncomeCategories() { return state.categories.filter(c => c.type === 'income'); }
function getExpenseCategories() { return state.categories.filter(c => c.type === 'expense'); }
function allExpenseSubcats() { let r = []; getExpenseCategories().forEach(c => c.subcategories.forEach(s => r.push({cat: c.name, sub: s}))); return r; }
function allIncomeSubcats() { let r = []; getIncomeCategories().forEach(c => c.subcategories.forEach(s => r.push({cat: c.name, sub: s}))); return r; }

function getAccountMovements(month, account) { return getTxByMonth(month).filter(t => (t.account || state.accounts[0]) === account); }
function getAccountIncome(month, account) { return getAccountMovements(month, account).filter(t => t.type === 'income').reduce((s,t) => s + t.amount, 0); }
function getAccountExpense(month, account) { return getAccountMovements(month, account).filter(t => t.type === 'expense').reduce((s,t) => s + t.amount, 0); }

function toast(msg, type) {
  const el = document.createElement('div'); el.className = 'toast ' + (type||'success'); el.textContent = msg;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => el.remove(), 2800);
}

function pieChart(container, data) {
  const total = data.reduce((s,d) => s + d.value, 0);
  if (total === 0) { container.innerHTML = '<div class="empty-state"><div class="icon">&#128202;</div><p>Sin datos este mes</p></div>'; return; }
  const w = 220, h = 220, cx = w/2, cy = h/2, r = 90;
  let svg = '<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'"><g transform="translate('+cx+','+cy+')">';
  let angle = -Math.PI / 2;
  data.forEach((d, i) => {
    const slice = (d.value / total) * 2 * Math.PI;
    const x1 = Math.cos(angle) * r, y1 = Math.sin(angle) * r;
    const x2 = Math.cos(angle + slice) * r, y2 = Math.sin(angle + slice) * r;
    const large = slice > Math.PI ? 1 : 0;
    svg += '<path d="M 0 0 L '+x1+' '+y1+' A '+r+' '+r+' 0 '+large+' 1 '+x2+' '+y2+' Z" fill="'+COLORS[i % COLORS.length]+'" stroke="var(--surface2)" stroke-width="2"/>';
    angle += slice;
  });
  svg += '<circle r="50" fill="var(--surface2)"/><text text-anchor="middle" dy="-4" fill="var(--text)" font-size="14" font-weight="700">'+fmt(total)+'</text><text text-anchor="middle" dy="14" fill="var(--text2)" font-size="10">Total</text></g></svg>';
  let legend = '<div style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:12px;">';
  data.forEach((d, i) => { const pct = total > 0 ? Math.round(d.value / total * 100) : 0; legend += '<div style="font-size:.75rem;display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:'+COLORS[i%COLORS.length]+';display:inline-block"></span>'+d.label+': '+fmt(d.value)+' ('+pct+'%)</div>'; });
  legend += '</div>';
  container.innerHTML = svg + legend;
}

// ---------- Registrar ----------
function renderRegistrar() {
  let html = '<div class="card"><h2>Nuevo Movimiento</h2><div class="form-row"><div class="form-group"><label>Tipo</label><select id="txType" onchange="onTxTypeChange()"><option value="expense">Gasto</option><option value="income">Ingreso</option></select></div><div class="form-group"><label>Categoria</label><select id="txCat" onchange="onTxCatChange()"></select></div></div><div class="form-row"><div class="form-group"><label>Subcategoria</label><select id="txSub"></select></div><div class="form-group"><label>Monto ($)</label><input type="number" id="txAmount" placeholder="Ej: 50000" min="0" step="100"></div></div><div class="form-row"><div class="form-group"><label>Fecha</label><input type="date" id="txDate"></div><div class="form-group"><label>Descripcion (opcional)</label><input type="text" id="txDesc" placeholder="Ej: Compra semanal"></div></div><div class="form-group"><label>Cuenta</label><div class="account-pills" id="acctPills"></div></div><button class="btn btn-primary" onclick="addTransaction()" style="width:100%;margin-top:8px;">Guardar Movimiento</button></div>';
  const d = new Date(); const today = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  document.getElementById('main').innerHTML = html;
  document.getElementById('txDate').value = today;
  renderAccountPills();
  onTxTypeChange();
}
function renderAccountPills() {
  const container = document.getElementById('acctPills'); if (!container) return;
  if (!window._selAcct || !state.accounts.includes(window._selAcct)) window._selAcct = state.accounts[0];
  container.innerHTML = state.accounts.map((a,i) => '<span class="account-pill '+getAccountColor(i)+(a===window._selAcct?' selected':'')+'" onclick="selectAccount('+i+')">'+a+'</span>').join('');
}
function selectAccount(i) { window._selAcct = state.accounts[i]; renderAccountPills(); }
function onTxTypeChange() {
  const type = document.getElementById('txType').value;
  document.getElementById('txCat').innerHTML = state.categories.filter(c => c.type === type).map(c => '<option value="'+c.name+'">'+c.name+'</option>').join('');
  onTxCatChange();
}
function onTxCatChange() {
  const cat = state.categories.find(c => c.name === document.getElementById('txCat').value);
  document.getElementById('txSub').innerHTML = cat ? cat.subcategories.map(s => '<option value="'+s+'">'+s+'</option>').join('') : '';
}
function addTransaction() {
  const type = document.getElementById('txType').value;
  const category = document.getElementById('txCat').value;
  const subcategory = document.getElementById('txSub').value;
  const amount = parseInt(document.getElementById('txAmount').value) || 0;
  const date = document.getElementById('txDate').value;
  const description = document.getElementById('txDesc').value;
  const account = window._selAcct || state.accounts[0];
  if (!category || !subcategory || amount <= 0) return toast('Completa categoria, subcategoria y monto', 'error');
  state.transactions.push({ id: uid(), type, category, subcategory, amount, date, description, account });
  saveAll(); document.getElementById('txAmount').value = ''; document.getElementById('txDesc').value = '';
  toast('Movimiento guardado!', 'success');
}

// ---------- Dashboard ----------
function renderDashboard() {
  const month = state.currentMonth;
  const income = getIncomeTotal(month), expense = getExpenseTotal(month), balance = income - expense;
  const budgetTotal = getBudgetTotal(month), budgetPct = budgetTotal > 0 ? Math.round(expense / budgetTotal * 100) : 0;
  const expenseMap = getExpenseBySubcat(month);
  let alerts = '';
  if (budgetTotal > 0 && expense > budgetTotal) alerts += '<div class="alert alert-danger">Te pasaste del presupuesto! '+fmt(budgetTotal)+' vs '+fmt(expense)+' ('+budgetPct+'%)</div>';
  else if (budgetPct > 80) alerts += '<div class="alert alert-warning">Cuidado! '+budgetPct+'% del presupuesto</div>';
  if (balance < 0) alerts += '<div class="alert alert-danger">Saldo negativo: '+fmt(balance)+'</div>';
  allExpenseSubcats().forEach(sc => {
    const spent = expenseMap[sc.cat+'|'+sc.sub] || 0;
    const budget = (state.budgets[month]||{})[sc.cat+'|'+sc.sub] || 0;
    if (budget > 0 && spent > budget) alerts += '<div class="alert alert-warning">'+sc.cat+' / '+sc.sub+': '+fmt(spent)+' de '+fmt(budget)+'</div>';
  });
  const pieData = [];
  allExpenseSubcats().forEach(sc => { const v = expenseMap[sc.cat+'|'+sc.sub]||0; if (v>0) pieData.push({label:sc.cat+' / '+sc.sub, value:v}); });
  pieData.sort((a,b) => b.value-a.value);

  // Build HTML

  });
  svg+='<rect x="'+(svgW-130)+'" y="5" width="10" height="10" rx="2" fill="#4ade80" opacity="0.85"/><text x="'+(svgW-116)+'" y="13" fill="var(--text2)" font-size="10">Ingresos</text>';

  });
  document.getElementById('budgetProgress').innerHTML = prog || '<div class="empty-state"><p>Sin presupuesto. Ve a Planificacion.</p></div>';
}

function copyPreviousBudget() {
  const month = state.currentMonth, prevKey = getPrevMonthKey(month);
  if (!state.budgets[prevKey]) return toast('No hay presupuesto del mes anterior', 'error');
  state.budgets[month] = JSON.parse(JSON.stringify(state.budgets[prevKey])); saveAll(); renderPlanificacion();
  toast('Copiado del mes anterior!', 'success');
}
function getPrevMonthKey(key) { const d = new Date(key+'-01'); d.setMonth(d.getMonth()-1); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function saveBudget(key) {
  const el = document.getElementById('budget_' + key.replace(/[^a-zA-Z0-9]/g,'_'));
  if (!el) return;
  if (!state.budgets[state.currentMonth]) state.budgets[state.currentMonth] = {};
  state.budgets[state.currentMonth][key] = parseInt(el.value) || 0;
}
function saveAllBudgets() {
  const month = state.currentMonth;
  if (!state.budgets[month]) state.budgets[month] = {};
  allExpenseSubcats().forEach(sc => { const k = sc.cat+'|'+sc.sub, el = document.getElementById('budget_'+k.replace(/[^a-zA-Z0-9]/g,'_')); if (el) state.budgets[month][k] = parseInt(el.value)||0; });

}

function getYearTotal(year, type) { return state.transactions.filter(t => t.type===type&&t.date.startsWith(year)).reduce((s,t)=>s+t.amount,0); }

// ---------- Movimientos ----------
function renderMovimientos() {

  let html = '<div class="card"><h2>Movimientos - '+monthName(month)+'</h2><div class="filter-pills"><span class="filter-pill active" onclick="filterTxs(\'Todas\')">Todas</span>';
  state.accounts.forEach((a,i) => { html += '<span class="filter-pill" onclick="filterTxs(\''+a+'\')"><span class="account-dot '+getAccountColor(i)+'" style="display:inline-block;vertical-align:middle"></span> '+a+'</span>'; });

function renderMovTable(txList) {

  let h = '<table><thead><tr><th>Fecha</th><th>Tipo</th><th>Cuenta</th><th>Categoria</th><th>Subcategoria</th><th>Descripcion</th><th>Monto</th><th></th></tr></thead><tbody>';

  });

function filterTxs(account) {
  window._movFilter = account;
  const filtered = account==='Todas' ? window._movTx : window._movTx.filter(t => (t.account||state.accounts[0])===account);

  document.getElementById('movTableContainer').innerHTML = renderMovTable(filtered);
}
function deleteTx(id) { state.transactions = state.transactions.filter(t => t.id!==id); saveAll(); renderMovimientos(); toast('Eliminado', 'success'); }
function deleteAllMonth() { if(!confirm('Borrar TODOS los movimientos de este mes?'))return; state.transactions=state.transactions.filter(t=>!t.date.startsWith(state.currentMonth));saveAll();renderMovimientos();toast('Borrados','success'); }

function renderConfiguracion() {
  let html = '<div class="card"><h2>Categorias</h2><p style="color:var(--text2);margin-bottom:12px;font-size:.85rem">Agrega, edita o elimina categorias y subcategorias</p><div class="form-row" style="margin-bottom:14px"><div class="form-group"><label>Nueva Categoria</label><input type="text" id="newCatName" placeholder="Nombre"></div><div class="form-group"><label>Tipo</label><select id="newCatType"><option value="expense">Gasto</option><option value="income">Ingreso</option></select></div></div><button class="btn btn-primary btn-sm" onclick="addCategory()" style="margin-bottom:20px">+ Crear Categoria</button>';
  state.categories.forEach(cat => {
    html += '<div class="category-block" style="border-left:3px solid '+(cat.type==='income'?'var(--green)':'var(--red)')+'"><div class="cat-header"><span class="cat-name">'+cat.name+' <span class="tag '+(cat.type==='income'?'tag-income':'tag-expense')+'">'+(cat.type==='income'?'Ingreso':'Gasto')+'</span></span><button class="btn btn-sm btn-danger" onclick="deleteCategory(\''+cat.name+'\')">Eliminar</button></div><div class="sub-tags">';

  });

  html += '<div class="card" style="margin-top:16px"><h2>Cuentas</h2><p style="color:var(--text2);margin-bottom:12px;font-size:.85rem">Gestiona tus cuentas bancarias</p><div style="display:flex;gap:8px;margin-bottom:14px"><input type="text" id="newAcctName" placeholder="Nombre" class="inline-input" style="flex:1"><button class="btn btn-primary btn-sm" onclick="addAccount()">+ Agregar</button></div>';
  state.accounts.forEach((a,i) => { html += '<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border:1px solid var(--border);border-radius:6px;margin-bottom:6px;background:var(--surface2)"><span class="account-info"><span class="account-dot '+getAccountColor(i)+'"></span><strong>'+a+'</strong></span><div style="display:flex;gap:8px;align-items:center"><input type="text" id="renameAcct_'+i+'" placeholder="Renombrar" class="inline-input" style="width:130px"><button class="btn btn-sm btn-outline" onclick="renameAccount('+i+')">Renombrar</button><button class="btn btn-sm btn-danger" onclick="deleteAccount('+i+')">x</button></div></div>'; });
  html += '</div>';
  document.getElementById('main').innerHTML = html;
}
function addCategory() {
  const name = document.getElementById('newCatName').value.trim(), type = document.getElementById('newCatType').value;
  if (!name) return toast('Escribe un nombre', 'error');
  if (state.categories.find(c => c.name===name)) return toast('Ya existe', 'error');
  state.categories.push({name,type,subcategories:[]}); saveAll(); renderConfiguracion(); toast('Creada: '+name, 'success');
}
function deleteCategory(name) {
  if (!confirm('Eliminar "'+name+'"?')) return;
  state.categories = state.categories.filter(c => c.name!==name); saveAll(); renderConfiguracion(); toast('Eliminada', 'success');
}
function addSubcategory(catName) {
  const el = document.getElementById('newSub_'+catName.replace(/[^a-zA-Z0-9]/g,'_'));
  const val = (el.value||'').trim(); if (!val) return toast('Escribe un nombre', 'error');
  const cat = state.categories.find(c => c.name===catName); if (!cat) return;
  if (cat.subcategories.includes(val)) return toast('Ya existe', 'error');
  cat.subcategories.push(val); saveAll(); el.value = ''; renderConfiguracion(); toast('Agregada', 'success');
}
function deleteSubcategory(catName, sub) {
  const cat = state.categories.find(c => c.name===catName); if (!cat) return;
  cat.subcategories = cat.subcategories.filter(s => s!==sub); saveAll(); renderConfiguracion(); toast('Eliminada', 'success');
}
function addAccount() {
  const name = document.getElementById('newAcctName').value.trim();
  if (!name) return toast('Escribe un nombre', 'error');
  if (state.accounts.includes(name)) return toast('Ya existe', 'error');
  state.accounts.push(name); saveAll(); renderConfiguracion(); toast('Cuenta: '+name, 'success');
}
function renameAccount(i) {
  const el = document.getElementById('renameAcct_'+i), name = (el.value||'').trim();
  if (!name) return toast('Escribe un nombre', 'error');
  if (state.accounts.some((a,j) => j!==i && a===name)) return toast('Nombre duplicado', 'error');
  const old = state.accounts[i]; state.accounts[i] = name;
  state.transactions.forEach(t => { if(t.account===old) t.account = name; });
  saveAll(); renderConfiguracion(); toast('Renombrada', 'success');
}
function deleteAccount(i) {
  if (!confirm('Eliminar "'+state.accounts[i]+'"?')) return;
  const name = state.accounts[i]; state.accounts.splice(i, 1);
  state.transactions.forEach(t => { if(t.account===name) t.account = state.accounts[0]||'General'; });
  saveAll(); renderConfiguracion(); toast('Eliminada', 'success');
}

// ---------- Datos ----------
function renderDatos() {
  document.getElementById('main').innerHTML = '<div class="card"><h2>Gestion de Datos</h2><div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px"><button class="btn btn-primary" onclick="exportCSV()">Exportar CSV</button><button class="btn btn-outline" onclick="exportJSON()">Exportar JSON</button></div><div class="form-group"><label>Importar desde CSV</label><input type="file" id="csvFile" accept=".csv" onchange="importCSV(this)"></div><div class="form-group"><label>Importar desde JSON</label><input type="file" id="jsonFile" accept=".json" onchange="importJSONFile(this)"></div><button class="btn btn-danger" onclick="resetAll()" style="margin-top:12px">Reiniciar Todo</button></div><div class="card"><h3>Estadisticas</h3><p style="font-size:.85rem;color:var(--text2)">Transacciones: <strong>'+state.transactions.length+'</strong></p><p style="font-size:.85rem;color:var(--text2)">Categorias: <strong>'+state.categories.length+'</strong></p><p style="font-size:.85rem;color:var(--text2)">Meses con presupuesto: <strong>'+Object.keys(state.budgets).length+'</strong></p></div>';
}
function exportCSV() {
  let csv = 'id,tipo,cuenta,categoria,subcategoria,monto,fecha,descripcion\n';
  state.transactions.forEach(t => { csv += [t.id,t.type,t.account||state.accounts[0],t.category,t.subcategory,t.amount,t.date,t.description||''].join(',')+'\n'; });
  downloadFile('finanzas2026_movimientos.csv', csv);
}
function exportJSON() { downloadFile('finanzas2026_completo.json', JSON.stringify({accounts:state.accounts,categories:state.categories,transactions:state.transactions,budgets:state.budgets},null,2)); }
function downloadFile(name, content) { const b=new Blob([content],{type:'text/plain'}); const u=URL.createObjectURL(b); const a=document.createElement('a');a.href=u;a.download=name;a.click();URL.revokeObjectURL(u);toast('Descargado: '+name,'success'); }
function importCSV(input) {
  const f=input.files[0]; if(!f)return; const r=new FileReader();
  r.onerror=()=>toast('Error al leer archivo','error');
  r.onload=function(e){
    const lines=e.target.result.split('\n').filter(l=>l.trim()); if(lines.length<2)return toast('Vacio','error');
    let c=0; for(let i=1;i<lines.length;i++){const cols=lines[i].split(',');if(cols.length<7)continue;const tx={id:cols[0]||uid(),type:cols[1],account:cols[2]||state.accounts[0],category:cols[3],subcategory:cols[4],amount:parseInt(cols[5])||0,date:cols[6],description:cols[7]||''};if(tx.type&&tx.category&&tx.date){state.transactions.push(tx);c++;}}
    saveAll(); toast('Importados '+c+' movimientos','success'); renderCurrentTab();
  }; r.readAsText(f);
}
function importJSONFile(input) {
  const f=input.files[0]; if(!f)return; const r=new FileReader();
  r.onerror=()=>toast('Error al leer archivo','error');
  r.onload=function(e){
    try{const d=JSON.parse(e.target.result);let nTx=0,nBud=0,nAcct=0;
    if(d.accounts&&Array.isArray(d.accounts)){state.accounts=d.accounts;nAcct=d.accounts.length;}
    if(d.categories&&Array.isArray(d.categories)){state.categories=d.categories;}
    if(d.transactions&&Array.isArray(d.transactions)){state.transactions=state.transactions.concat(d.transactions);nTx=d.transactions.length;}
    if(d.budgets&&typeof d.budgets==='object'){Object.assign(state.budgets,d.budgets);nBud=Object.keys(d.budgets).length;}
    state.transactions.forEach(t=>{if(!t.account)t.account=state.accounts[0]||'General';});
    saveAll(); toast('Importado! '+nTx+' mov, '+nBud+' meses'+(nAcct>0?', '+nAcct+' cuentas':''),'success'); renderCurrentTab();
    }catch(err){toast('JSON no valido: '+err.message,'error');}
  }; r.readAsText(f);
}
function resetAll() {
  if(!confirm('Borrar TODO? Primer aviso'))return;
  if(!confirm('SEGURO? No se puede deshacer'))return;
  state.categories=JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));state.transactions=[];state.budgets={};state.accounts=['Banco Santander','Banco de Chile','Mercado Pago'];
  saveAll(); renderDatos(); toast('Reiniciado','success');
}

// ---------- Nav ----------
function switchTab(tab) {
  state.currentTab = tab;
  document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
  const btn = document.querySelector('[data-tab="'+tab+'"]'); if (btn) btn.classList.add('active');
  renderCurrentTab();
}
function renderCurrentTab() {
  switch(state.currentTab) {
    case 'registrar': renderRegistrar(); break;
    case 'dashboard': renderDashboard(); break;
    case 'planificacion': renderPlanificacion(); break;
    case 'proyeccion': renderProyeccion(); break;
    case 'movimientos': renderMovimientos(); break;
    case 'configuracion': renderConfiguracion(); break;
    case 'datos': renderDatos(); break;
    default: renderDashboard();
  }
}
function changeMonth(dir) { const sel=document.getElementById('monthSelect'); const idx=sel.selectedIndex+dir; if(idx>=0&&idx<sel.options.length){sel.selectedIndex=idx;onMonthChange();} }
function onMonthChange() { state.currentMonth=document.getElementById('monthSelect').value; LS.set('currentMonth',state.currentMonth); renderCurrentTab(); }

// ---------- Init ----------
document.getElementById('tabs').addEventListener('click', function(e) { if(e.target.tagName==='BUTTON'&&e.target.dataset.tab) switchTab(e.target.dataset.tab); });
window.deleteTx=deleteTx; window.addTransaction=addTransaction; window.onTxTypeChange=onTxTypeChange; window.onTxCatChange=onTxCatChange;
window.selectAccount=selectAccount; window.renderAccountPills=renderAccountPills;
window.copyPreviousBudget=copyPreviousBudget; window.saveAllBudgets=saveAllBudgets; window.saveBudget=saveBudget;
window.deleteAllMonth=deleteAllMonth; window.filterTxs=filterTxs;
window.deleteCategory=deleteCategory; window.deleteSubcategory=deleteSubcategory; window.addCategory=addCategory; window.addSubcategory=addSubcategory;
window.addAccount=addAccount; window.renameAccount=renameAccount; window.deleteAccount=deleteAccount;
window.exportCSV=exportCSV; window.exportJSON=exportJSON; window.importCSV=importCSV; window.importJSONFile=importJSONFile;
window.resetAll=resetAll; window.changeMonth=changeMonth; window.onMonthChange=onMonthChange;

const savedMonth = LS.get('currentMonth', null);
if (savedMonth) state.currentMonth = savedMonth;
document.getElementById('monthSelect').value = state.currentMonth;
// Migrate old transactions
let migrated=0; state.transactions.forEach(t=>{if(!t.account){t.account=state.accounts[0];migrated++;}}); if(migrated>0)saveAll();
switchTab('dashboard');
</script>
</body>
